<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Interactivas de Ropa</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --bg: #f3f4f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 500px;
            perspective: 1000px;
        }
        .card {
            width: 100%;
            height: 450px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 20px;
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-radius: 20px;
            background: white;
            box-sizing: border-box;
        }
        .card-back {
            transform: rotateY(180deg);
            background: #e0f2fe;
            justify-content: center;
        }
        .clothing-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
        }
        .text-en { font-size: 2rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .text-es { font-size: 1.8rem; font-weight: bold; color: #1e40af; }
        .sentence { font-size: 1rem; color: #4b5563; text-align: center; margin: 5px 0; }
        
        button {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 1.2rem;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: none;
            transition: 0.3s;
        }
        button:hover { background-color: #d97706; }

        #final-screen {
            display: none;
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        #players-list {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <div class="card" id="card" onclick="flipCard()">
        <div class="card-face card-front">
            <img id="img-placeholder" class="clothing-img" src="" alt="Clothing">
            <div id="word-en" class="text-en"></div>
            <div id="sentence-en" class="sentence"></div>
        </div>
        <div class="card-face card-back">
            <div id="word-es" class="text-es"></div>
            <div id="sentence-es" class="sentence"></div>
        </div>
    </div>
    <button id="next-btn" onclick="nextCard()">SIGUIENTE</button>
</div>

<div id="final-screen">
    <h1 style="color: #dc2626;">GAME OVER</h1>
    <input type="text" id="player-name" placeholder="Tu nombre aquí" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
    <button onclick="savePlayer()" style="display: inline-block;">INGRESA TU NOMBRE</button>
    <h3>Registro de Participantes:</h3>
    <div id="players-list"></div>
</div>

<script>
    const vocabulary = [
        { en: "button t shirt", es: "camiseta con botones", img: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&w=500&q=80", senEn: "She tries a button t shirt", senEs: "Ella intenta una camiseta con botones", pastEn: "She tried a button t shirt", pastEs: "Ella intentó una camiseta con botones" },
        { en: "tight jeans", es: "jeans apretados", img: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=500&q=80", senEn: "He tries tight jeans", senEs: "Él intenta jeans apretados", pastEn: "He tried tight jeans", pastEs: "Él intentó jeans apretados" },
        { en: "flip flops", es: "zapatillas de baño", img: "https://images.unsplash.com/photo-1591533611384-633045618f88?auto=format&fit=crop&w=500&q=80", senEn: "I try flip flops", senEs: "Yo intento zapatillas de baño", pastEn: "I tried flip flops", pastEs: "Yo intenté zapatillas de baño" },
        { en: "hoodie", es: "buso con capucha", img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=500&q=80", senEn: "You try a hoodie", senEs: "Tú intentas un buso con capucha", pastEn: "You tried a hoodie", pastEs: "Tú intentaste un buso con capucha" },
        { en: "swim trunks", es: "pantaloneta de baño", img: "https://images.unsplash.com/photo-1590053140685-da9434857640?auto=format&fit=crop&w=500&q=80", senEn: "We try swim trunks", senEs: "Nosotros intentamos una pantaloneta de baño", pastEn: "We tried swim trunks", pastEs: "Nosotros intentamos una pantaloneta de baño" },
        { en: "jacket", es: "chamarra", img: "https://images.unsplash.com/photo-1551028711-031c9f8040a1?auto=format&fit=crop&w=500&q=80", senEn: "They try a jacket", senEs: "Ellos intentan una chamarra", pastEn: "They tried a jacket", pastEs: "Ellos intentaron una chamarra" }
    ];

    let currentIndex = 0;
    let hasFlipped = false;
    const synth = window.speechSynthesis;

    function speak(text, lang) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 0.9;
        synth.speak(utterance);
    }

    function loadCard() {
        const item = vocabulary[currentIndex];
        document.getElementById('img-placeholder').src = item.img;
        document.getElementById('word-en').innerText = item.en;
        document.getElementById('sentence-en').innerText = `${item.senEn} / ${item.pastEn}`;
        
        document.getElementById('word-es').innerText = item.es;
        document.getElementById('sentence-es').innerText = `${item.senEs} / ${item.pastEs}`;
        
        document.getElementById('card').classList.remove('is-flipped');
        document.getElementById('next-btn').style.display = 'none';
        hasFlipped = false;
        
        // Voz inicial en inglés
        setTimeout(() => speak(item.en, 'en-US'), 500);
    }

    function flipCard() {
        const card = document.getElementById('card');
        const item = vocabulary[currentIndex];
        card.classList.toggle('is-flipped');
        
        if (card.classList.contains('is-flipped')) {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            speak(item.es, 'es-MX');
            document.getElementById('next-btn').style.display = 'block';
            hasFlipped = true;
        } else {
            speak(item.en, 'en-US');
        }
    }

    function nextCard() {
        currentIndex++;
        if (currentIndex < vocabulary.length) {
            loadCard();
        } else {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            displayPlayers();
        }
    }

    function savePlayer() {
        const name = document.getElementById('player-name').value;
        if (name) {
            let players = JSON.parse(localStorage.getItem('players') || '[]');
            players.push({name: name, date: new Date().toLocaleDateString()});
            localStorage.setItem('players', JSON.stringify(players));
            document.getElementById('player-name').value = '';
            displayPlayers();
        }
    }

    function displayPlayers() {
        const list = document.getElementById('players-list');
        const players = JSON.parse(localStorage.getItem('players') || '[]');
        list.innerHTML = players.map(p => `<div><strong>${p.name}</strong> - ${p.date}</div>`).join('');
    }

    window.onload = loadCard;
</script>

</body>
</html>
